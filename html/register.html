<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fav icon  -->
    <link rel="shortcut icon" href="../img/user.png" type="image/x-icon" />
    <title>Register page</title>
  </head>
  <body>
    <div align="center">
      <img src="../img/register.png" width="100" alt="" />
      <h1>Register page</h1>
      <hr />
      <form action="">
        <label for="f-name">Your name</label><br />
        <input type="text" name="f-name" placeholder="Enter your name" /><br />
        <label for="user">Your username</label><br />
        <input
          type="text"
          name="user"
          placeholder="Enter your username"
        /><br />

        <label for="mail">Your Email</label><br />
        <input type="email" name="mail" placeholder="Enter your email" /><br />
        <label for="pass">Your password</label><br />
        <input
          type="password"
          name="pass"
          placeholder="Enter your password"
        /><br />
        <label for="c-pass">Your Confirm password</label><br />
        <input
          type="password"
          name="c-pass"
          placeholder="Enter your Confirm password"
        /><br />
        <input type="submit" value="Register" />
      </form>

      <p>
        Already have an account please
        <a href="../index.html" target="_blank">login here</a>
      </p>
    </div>
  </body>
</html>
